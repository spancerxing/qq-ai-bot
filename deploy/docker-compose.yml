services:
  qq-ai-bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: qq-ai-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
